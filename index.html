<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>行削除リンク</title>
  <style>
    #deleteRow {
      cursor: pointer;
      color: red;
      text-decoration: underline;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <!-- 行削除 -->
  <span id="deleteRow">行削除</span>

  <script>
    document.getElementById("deleteRow").addEventListener("click", function () {
      // ★ここに開きたいページURLを入れる
      const url = "https://github.com/w6211770-work/test_web2/blob/main/index.html";

      // 同じタブで開く
      window.location.href = url;

      // 新しいタブで開く場合はこちら
      // window.open(url, "_blank");
    });
  </script>

</body>
</html>
